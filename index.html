<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>창고수량재고</title>
  <style>
    :root{
      --bg:#ffffff;
      --text:#111827;
      --muted:#6b7280;
      --line:#e5e7eb;
      --card:#ffffff;
      --chip:#f3f4f6;

      --stockbg:#f3f6fa;
      --out:#c63e3e;   /* 출고 */
      --in:#1453af;    /* 입고 */

      --radius:8px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, "Apple SD Gothic Neo","Noto Sans KR", Arial;
      background:var(--bg);
      color:var(--text);
    }
    .wrap{
      max-width: 640px;
      margin: 22px auto 70px;
      padding: 0 14px;
    }

    /* ---------- Topbar ---------- */
    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      padding-bottom: 20px;
      border-bottom:1px solid var(--line);
      margin-bottom: 21px;
    }
    .brand a{
      color:inherit;
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      gap:8px;
      min-width: 0;
    }
    h1{
      font-size: 20px;
      font-weight: 900;
      margin: 0;
      letter-spacing:-0.2px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .search{
      flex:1;
      display:flex;
      gap:8px;
      align-items:center;
      justify-content:flex-end;
    }
    .search input{
      width: min(180px, 100%);
      padding: 10px 10px;
      border:1px solid var(--line);
      border-radius: 8px;
      outline:none;
      font-size:12px;
    }
    .pill{
      padding: 9px 14px;
      border:1px solid var(--line);
      border-radius: 10px;
      background: var(--chip);
      font-size: 12px;
      cursor:pointer;
      user-select:none;
      white-space:nowrap;
      font-weight: 900;
    }

    /* ---------- Home List ---------- */
    .section{ margin-top: 20px; }
    .section h2{
      font-size: 13px;
      color: var(--muted);
      font-weight: 600;
      margin: 20px 0 10px;
      padding-left: 20px;
      letter-spacing: 0.6px;
    }
    .list{
      display:flex;
      flex-direction:column;
      gap: 15px;
    }
    .row{
      display:grid;
      grid-template-columns: 1fr 125px;
      gap: 11px;
      align-items: stretch;
    }
    .card{
      border:1px solid var(--line);
      border-radius: var(--radius);
      background: var(--card);
      padding: 10px;
      display:flex;
      gap: 14px;
      align-items:center;
      min-height: 84px;
      cursor:pointer;
      transition: transform .06s ease;
    }
    .card:active{ transform: scale(0.997); }
    .thumb{
      width: 74px;
      height: 74px;
      border-radius: 8px;
      background: #f8fafc;
      display:flex;
      align-items:center;
      justify-content:center;
      flex: 0 0 auto;
      overflow:hidden;
      border:1px solid #ffffff;
    }
    .thumb img{
      width: 100%;
      height: 100%;
      object-fit: cover;
      display:block;
      filter: saturate(0.95);
    }
    .meta{
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 8px;
      text-align: left;
      min-width:0;
    }

    .meta-bot{
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 11px;
      color: var(--muted);
      margin-top: 6px;
      min-width:0;
    }
    .meta-bot span{ white-space: nowrap; }

    .title{       /* ---------- 홈 품목 타이틀 ---------- */
      font-weight: 700;
      font-size: 16px;
      line-height: 1.8;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      letter-spacing:-0.1px;
    }
    .size{        /* ---------- 홈 품목 타이틀 사이즈 ---------- */
      font-size: 12px;
      color: var(--muted);
      white-space:nowrap;
      font-weight: 600;
    }

    .status{ font-weight: 600; }    /* ---------- 홈 품목 타이틀 입출고 수량 ---------- */
    .status.out{ color: var(--out); }
    .status.in{ color: var(--in); }
    .delta{ white-space:nowrap; font-weight: 600;}
    .delta .qty{ font-weight: 600; margin-left: 6px; }
    .delta .qty.out{ color: var(--out); }
    .delta .qty.in{ color: var(--in); }

    .stock{
      border:1px solid #f1f5f9;
      border-radius: var(--radius);
      background: var(--stockbg);
      display:flex;
      align-items:center;
      justify-content:center;
      font-weight: 900;
      font-size: 18px;
      letter-spacing: -0.2px;
    }
    .stock small{
      font-size: 13px;
      color: var(--muted);
      font-weight: 800;
      position: relative;
      top: 1px;
      margin-left: 2px;
    }

    /* ---------- Detail ---------- */
    .paper{
      border:1px solid var(--line);
      border-radius: 14px;
      background:#fff;
      overflow:hidden;
    }
    .paper-head{
      padding: 14px 18px;
      border-bottom:1px solid var(--line);
      font-weight: 700;
      letter-spacing:-0.2px;
    }
    .paper-body{ padding: 16px; }

    .imgRow{
      display:flex;
      justify-content:center;
      gap: 18px;
      padding: 10px 0 16px;
      margin: 0 8px;
    }
    .imgBox{
      width: 120px;
      height: 120px;
      border-radius: 12px;
      background:#f8fafc;
      border:1px solid #ffffff;
      overflow:hidden;
      display:flex;
      align-items:center;
      justify-content:center;
    }
    .imgBox img{ width:100%; height:100%; object-fit:cover; display:block; }
    .imgPh{ width: 36px; height: 36px; opacity:.6; }

    .itemHeader{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      padding: 10px 6px 10px;
      align-items:end;
    }
    .itemLeft .itemName{
      font-size: 18px;
      font-weight: 800;
      letter-spacing:-0.2px;
      margin:0 0 6px;
    }
    .itemLeft .baseLine{
      display:flex;
      align-items:center;
      gap:10px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      white-space:nowrap;
    }
    .baseInput{
      width: 70px;
      border:1px solid var(--line);
      border-radius: 7px;
      padding: 5px 8px;
      font-weight: 700;
      font-size: 14px;
      outline:none;
      text-align:center;
    }
    .itemRight{ text-align:right; }
    .itemRight .sizeLine{
      font-weight: 700;
      font-size: 13px;
      margin-bottom: 15px;
    }
    .itemRight .stockLine{
      font-weight: 750;
      font-size: 17px;
      letter-spacing:0px;
      white-space:nowrap;
      margin-bottom: 3px;
    }
    .divider{ height:1px; background:var(--line); margin: 0 0 20px; }

    .boxTitleRow{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap: 12px;
      padding: 0 6px 5px;
    }
    .boxTitle{
      font-size: 14px;
      font-weight: 600;
      letter-spacing:-0.2px;
      margin-bottom: 5px;
      padding: 5px 10px;
    }
    .selDelBtn{
      padding: 7px 10px;
      border:1px solid var(--line);
      border-radius: 7px;
      background:#fff;
      font-weight: 500;
      cursor:pointer;
      white-space:nowrap;
    }

    /* ----- 입출고내역 칸 -------- */
    .logBox{
      margin: 0 3px 12px;
      border:1px solid var(--line);
      border-radius: 8px;
      background:#fff;

      /* ✅ 모바일/작은 화면에서 좌우 스크롤 가능하게 */
      overflow-x:auto;
      overflow-y:hidden;
      -webkit-overflow-scrolling: touch;
    }
    /* ✅ 스크롤 생기도록 최소 폭 확보 */
    .logMinWidth{
      min-width: 560px;
    }

    /* --- 입출고내역 헤더 --- */
   .logHead{
   display:grid;
   grid-template-columns: 36px 65px 1.1fr 1fr 100px; /* 날짜 / 구분 / 부서 / 담당자 / 수량 */
   gap: 18px;
   padding: 4px 16px;
   background:#f8fafc;
   border-bottom:1px solid var(--line);
   font-weight: 600;
   font-size: 12px;
   color:#111827;
   user-select:none;
   align-items:center;
   }

/* --- 입출고내역 행 --- */
   .logRow{
   display:grid;
   grid-template-columns: 80px 70px 1.1fr 1fr 50px; /* 날짜 / 구분 / 부서 / 담당자 / 수량 */
   gap: 7px;
   align-items:center;
   padding: 16px 12px;
   border-top:1px solid var(--line);
   font-size: 13px;
   cursor:pointer;
   }
    .hbtn{
      display:inline-flex;
      align-items:center;
      gap:6px;
      cursor:pointer;
      font-weight: 950;
    }
    .arrow{
      font-size: 10px;
      color: var(--muted);
      transform: translateY(-0.5px);
    }
    .hselect{
      width: 100%;
      border:1px solid var(--line);
      border-radius: 7px;
      padding: 5px 14px;
      background:#fff;
      font-weight: 600;
      font-size: 12px;
      outline:none;
      margin-left: 11px;
    }

    .hdateWrap{ position:relative; }

    .hdate{
      position:absolute;
      left:5px;
      top: 475px;
      width: 130px;
      padding: 5px 5px;
      border:1px solid var(--line);
      border-radius: 8px;
      background:#fff;
      display:none;
      z-index: 50;
      box-shadow: 0 1px 2px rgba(17,24,39,0.08);
    }
    .hdate input{
      width:100%;
      border:1px solid var(--line);
      border-radius: 8px;
      padding: 5px 8px;
      font-size: 11px;
      font-weight: 600;
      outline:none;
      background:#fff;
    }
    .hdate .row2{
      display:flex;
      justify-content:flex-end;
      gap:5px;
      margin-top:5px;
    }
    .miniBtn{
      border:1px solid var(--line);
      border-radius: 8px;
      padding: 3px 5px;
      background:#fff;
      cursor:pointer;
      font-weight: 600;
      font-size: 11px;
      white-space:nowrap;
    }

    .logRow{
      display:grid;
      grid-template-columns: 80px 70px 1.1fr 1fr 50px;
      gap: 7px;
      align-items:center;
      padding: 16px 12px;
      border-top:1px solid var(--line);
      font-size: 13px;
      cursor:pointer;
      background:#fff;
    }
    .logRow:first-child{ border-top:none; }
    .logRow.selected{
      outline: 1px solid #111827;
      outline-offset: -2px;
      background: #f8fafc;
    }
    .logDate{ color:#111827; font-weight: 700; }
    .logType{ font-weight: 00; }
    .logType.out{ color: var(--out); }
    .logType.in{ color: var(--in); }
    .logTo{ color:#111827; font-weight: 600; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .logQty{
      text-align:center;
      font-weight: 700;
      white-space:nowrap;
    }
    .logQty.out{ color: var(--out); }
    .logQty.in{ color: var(--in); }

    /* ---------- 상세 하단 버튼줄(내역추가/새로고침) ---------- */
    .detailActions{
      display:flex;
      gap:8px;
      justify-content:flex-end;
      margin: 10px 3px 0;
      flex-wrap:wrap;
    }
    .btn{
      padding: 10px 14px;
      border:1px solid var(--line);
      border-radius: 8px;
      background:#fff;
      font-weight: 600;
      cursor:pointer;
      user-select:none;
      white-space:nowrap;
      font-size: 12px;
    }
    .primary{ background:#2c2c2c; color:#fff; border-color:#111827; }

    /* ---------- ✅ 내역추가 모달(바텀시트) ---------- */
    .modal{
      display:none;
      position:fixed;
      inset:0;
      z-index: 9999;
    }
    .modal.show{ display:block; }
    .modalOverlay{
      position:absolute;
      inset:0;
      background: rgba(17,24,39,0.45);
    }
    .sheet{
      position:absolute;
      left:0; right:0; bottom:0;
      background:#fff;
      border-top-left-radius: 18px;
      border-top-right-radius: 18px;
      box-shadow: 0 -10px 30px rgba(0,0,0,0.12);
      overflow:hidden;
      max-height: 86vh;
      display:flex;
      flex-direction:column;
    }
    .sheetHead{
      padding: 14px 16px;
      border-bottom:1px solid var(--line);
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      font-weight: 900;
    }
    .sheetClose{
      border:1px solid var(--line);
      background:#fff;
      border-radius: 10px;
      padding: 6px 10px;
      cursor:pointer;
      font-weight: 800;
    }
    .sheetBody{
      padding: 14px 16px 6px;
      overflow:auto;
    }
    .field{
      margin-bottom: 12px;
    }
    .field label{
      display:block;
      font-size: 12px;
      color: var(--muted);
      font-weight: 700;
      margin-bottom: 6px;
    }
    .field input, .field select{
      width:100%;
      border:1px solid var(--line);
      border-radius: 12px;
      padding: 12px 12px;
      font-size: 14px;
      font-weight: 700;
      outline:none;
      background:#fff;
    }

    .seg{
      display:flex;
      gap:10px;
    }
    .seg button{
      flex:1;
      border:1px solid var(--line);
      border-radius: 12px;
      padding: 12px 12px;
      background:#fff;
      cursor:pointer;
      font-weight: 900;
      font-size: 14px;
    }
    .seg button.active.out{
      border-color: var(--out);
      color: var(--out);
      background: #fff5f5;
    }
    .seg button.active.in{
      border-color: var(--in);
      color: var(--in);
      background: #f1f5ff;
    }

    .sheetFoot{
      padding: 12px 16px 16px;
      border-top:1px solid var(--line);
      background:#fff;
    }
    .sheetFoot .primary{
      width:100%;
      padding: 14px 14px;
      border-radius: 14px;
      font-size: 14px;
      font-weight: 900;
    }

    /* ---------- Mobile ---------- */
    @media (max-width: 480px){
      .row{ grid-template-columns: 1fr 82px; gap: 10px; }
      .stock{ font-size: 15px; }
      .thumb{ width: 68px; height: 68px; }
      .search{ justify-content:flex-start; width:100%; }

      .itemHeader{ grid-template-columns: 1fr; }
      .itemRight{ text-align:left; }
      .itemRight .stockLine{ font-size: 20px; }

      /* ✅ 여기서 logBox는 스크롤로 보기 때문에 grid를 억지로 바꿀 필요 없음 */
      .hdate{
        width: min(92vw, 320px);
        top: 44px;
      }

      .detailActions{ justify-content:space-between; }
      .detailActions .btn{ flex:1; }
    }
  </style>
</head>

        category: "기타",
        items: [
          { id:"etc-shirt", name:"조지물튼 티셔츠", size:"", baseStock: 1000, img:null, images:[null,null], logs:[] },
          { id:"etc-bag", name:"SA 가방", size:"", baseStock: 1000, img:"images/SA-bag.jpg", images:["images/SA-bag.jpg", null], logs:[] },
        ]
      }
    ];

    const app = document.getElementById("app");
    const q = document.getElementById("q");
    const doSearch = document.getElementById("doSearch");
    const searchBox = document.getElementById("searchBox");
    const homeLink = document.getElementById("homeLink");

    function saveAll(){
      try{
        const payload = data.map(sec => ({
          category: sec.category,
          items: sec.items.map(it => ({
            id: it.id,
            baseStock: it.baseStock,
            logs: it.logs
          }))
        }));
        localStorage.setItem(STORAGE_KEY, JSON.stringify(payload));
      }catch(e){}
    }

    function loadAll(){
      try{
        const raw = localStorage.getItem(STORAGE_KEY);
        if(!raw) return;
        const saved = JSON.parse(raw);

        const byId = new Map();
        for(const sec of saved){
          for(const it of (sec.items||[])){
            byId.set(it.id, it);
          }
        }
        for(const sec of data){
          for(const it of sec.items){
            const s = byId.get(it.id);
            if(s){
              if(typeof s.baseStock === "number") it.baseStock = s.baseStock;
              if(Array.isArray(s.logs)) it.logs = s.logs;
            }
          }
        }
      }catch(e){}
    }

    loadAll();

    function iconPlaceholder(){
      return `
        <svg class="imgPh" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M7 7h10v14H7V7Z" stroke="#cbd5e1" stroke-width="1.6"/>
          <path d="M9 7a3 3 0 0 1 6 0" stroke="#cbd5e1" stroke-width="1.6" stroke-linecap="round"/>
        </svg>
      `;
    }
    function statusClass(s){ return s === "입고" ? "in" : "out"; }

    function toISODateLike(d){
      if(!d) return "";
      if(/^\d{4}-\d{2}-\d{2}$/.test(d)) return d;
      const m = String(d).match(/^(\d{1,2})\/(\d{1,2})$/);
      if(m){
        const y = new Date().getFullYear();
        const mm = String(m[1]).padStart(2,"0");
        const dd = String(m[2]).padStart(2,"0");
        return `${y}-${mm}-${dd}`;
      }
      return String(d);
    }
    function formatKRDate(d){
      const iso = toISODateLike(d);
      const m = iso.match(/^(\d{4})-(\d{2})-(\d{2})$/);
      if(!m) return iso || "-";
      return `${Number(m[2])}/${Number(m[3])}`;
    }

    function normalizeLog(r){
      const out = { ...r };
      out.d = toISODateLike(out.d);

      if(!out.dept && out.to){
        const parts = String(out.to).split("-").map(s=>s.trim());
        out.dept = parts[0] || out.dept;
        out.person = (parts[1] || "").replace(/^\(|\)$/g,"") || out.person;
      }
      out.t = (out.t === "입고") ? "입고" : "출고";
      out.dept = out.dept || "-";
      out.person = out.person || "";
      out.qty = Number(out.qty || 0);
      if(!out.__key) out.__key = `k_${Date.now()}_${Math.random().toString(16).slice(2)}`;
      return out;
    }

    function ensureLogs(it){
      it.logs = (it.logs || []).map(normalizeLog);
    }

    function signedQty(row){
      const qty = Number(row.qty || 0);
      if (!qty) return 0;
      return row.t === "입고" ? qty : -qty;
    }

    function calcStock(it){
      ensureLogs(it);
      const base = Number(it.baseStock || 0);
      const sum = (it.logs || []).reduce((a, r) => a + signedQty(r), 0);
      return base + sum;
    }

    function getLastLogInfo(it){
      ensureLogs(it);
      if(!it.logs || it.logs.length === 0) return { status:"-", date:"-", delta:0 };
      const sorted = [...it.logs].sort((a,b) => (toISODateLike(b.d)||"").localeCompare(toISODateLike(a.d)||""));
      const r = sorted[0];
      return { status: r.t || "-", date: formatKRDate(r.d), delta: signedQty(r) };
    }

    function findItemById(id){
      for (const section of data){
        for (const it of section.items){
          if (it.id === id) return { section, it };
        }
      }
      return null;
    }

    function renderHome(){
      searchBox.style.display = "flex";
      const keyword = (q.value || "").trim().toLowerCase();

      app.innerHTML = data.map(section => {
        const filtered = section.items.filter(it => {
          const hay = `${it.name} ${it.size}`.toLowerCase();
          return keyword ? hay.includes(keyword) : true;
        });

        if(filtered.length === 0) return "";

        return `
          <div class="section">
            <h2>${section.category}</h2>
            <div class="list">
              ${filtered.map(it => {
                const stock = calcStock(it);
                const last = getLastLogInfo(it);
                return `
                  <div class="row">
                    <div class="card" role="button" tabindex="0" data-open="${it.id}">
                      <div class="thumb">
                        ${it.img ? `<img src="${it.img}" alt="">` : iconPlaceholder()}
                      </div>

                      <div class="meta">
                        <div class="meta-top">
                          <div class="title">${it.name}</div>
                          <div class="size">${it.size || ""}</div>
                        </div>

                        <div class="meta-bot">
                          <div class="status ${statusClass(last.status)}">${last.status}</div>
                          <div class="delta">
                            <span>${last.date || "-"}</span>
                            <span class="qty ${last.delta >= 0 ? "in" : "out"}">${(last.delta>=0?"+":"")}${(last.delta||0).toLocaleString()}</span>
                          </div>
                        </div>
                      </div>
                    </div>

                    <div class="stock">
                      ${Number.isFinite(stock) ? `${stock.toLocaleString()}<small>개</small>` : `-`}
                    </div>
                  </div>
                `;
              }).join("")}
            </div>
          </div>
        `;
      }).join("");

      app.querySelectorAll("[data-open]").forEach(el => {
        const go = () => location.hash = `#/item/${el.dataset.open}`;
        el.addEventListener("click", go);
        el.addEventListener("keydown", (e) => {
          if (e.key === "Enter" || e.key === " ") { e.preventDefault(); go(); }
        });
      });
    }

    function renderDetail(id){
      searchBox.style.display = "none";

      const found = findItemById(id);
      if(!found){
        app.innerHTML = `
          <div class="paper">
            <div class="paper-head">알림</div>
            <div class="paper-body">
            </div>
          </div>
        `;
        return;
      }

      const { section, it } = found;
      ensureLogs(it);

      let dateFilter = "";
      let typeFilter = "전체";
      let deptFilter = "전체";
      let sortKey = "date";
      let sortDir = "desc";
      let selectedKeys = new Set();

      function arrow(){
        return sortDir === "asc" ? "↑" : "↓";
      }

      function toggleSort(key){
        if(sortKey === key){
          sortDir = (sortDir === "asc") ? "desc" : "asc";
        }else{
          sortKey = key;
          sortDir = (key === "date") ? "desc" : "asc";
        }
        render();
      }

      function matches(r){
        if(dateFilter && toISODateLike(r.d) !== dateFilter) return false;
        if(typeFilter !== "전체" && r.t !== typeFilter) return false;
        if(deptFilter !== "전체" && (r.dept||"-") !== deptFilter) return false;
        return true;
      }

      function sortRows(rows){
        const dir = (sortDir === "asc") ? 1 : -1;
        return rows.sort((a,b)=>{
          if(sortKey === "date"){
            return (String(toISODateLike(a.d)).localeCompare(String(toISODateLike(b.d)))) * dir;
          }
          if(sortKey === "qty"){
            return ((signedQty(a) - signedQty(b)) || 0) * dir;
          }
          return 0;
        });
      }

      function render(){
        ensureLogs(it);
        const img1 = (it.images && it.images[0]) ? `<img src="${it.images[0]}" alt="">` : iconPlaceholder();
        const img2 = (it.images && it.images[1]) ? `<img src="${it.images[1]}" alt="">` : iconPlaceholder();

        const stockNow = calcStock(it);
        const base = Number(it.baseStock || 0);

        const allDepts = [
        "경영기획팀","서비스운영팀","아카이브팀","대외협력팀","디자인팀","영업팀","브랜드기획팀","고객관리팀","작품관리팀","VIP사업기획팀","웹서비스개발팀"
];
        let view = (it.logs||[]).filter(matches);
        view = sortRows(view);

        app.innerHTML = `
          <div class="paper">
            <div class="paper-head">${section.category}</div>
            <div class="paper-body">

              <div class="imgRow">
                <div class="imgBox">${img1}</div>
                <div class="imgBox">${img2}</div>
              </div>

              <div class="itemHeader">
                <div class="itemLeft">
                  <div class="itemName">${it.name}</div>
                  <div class="baseLine">
                    <span>기준재고 </span>
                    <input class="baseInput" id="baseEdit" value="${Number.isFinite(base)?base:0}" />
                    <span>개</span>
                  </div>
                </div>

                <div class="itemRight">
                  <div class="sizeLine">${it.size || ""}</div>
                  <div class="stockLine">현재재고     ${stockNow.toLocaleString()}개</div>
                </div>
              </div>

              <div class="divider"></div>

              <div class="boxTitleRow">
                <p class="boxTitle">입출고 내역</p>
                <button class="selDelBtn" id="bulkDelete">선택 삭제</button>
              </div>

              <!-- ✅ logBox 자체가 가로스크롤 -->
              <div class="logBox">
                <div class="logMinWidth">
                  <div class="logHead">
                    <div class="hdateWrap">
                      <div class="hbtn" id="dateBtn">날짜 <span class="arrow">${sortKey==="date"?arrow():"↕"}</span></div>
                      <div class="hdate" id="datePop">
                        <input type="date" id="datePick" value="${dateFilter}">
                        <div class="row2">
                          <button class="miniBtn" id="dateClear">해제</button>
                          <button class="miniBtn" id="dateOk">적용</button>
                        </div>
                      </div>
                    </div>

                    <div>
                      <select class="hselect" id="typeSel">
                        <option value="전체" ${typeFilter==="전체"?"selected":""}>전체</option>
                        <option value="출고" ${typeFilter==="출고"?"selected":""}>출고</option>
                        <option value="입고" ${typeFilter==="입고"?"selected":""}>입고</option>
                      </select>
                    </div>

                    <div>
                      <select class="hselect" id="deptSel">

                        <option value="전체" ${deptFilter==="전체"?"selected":""}>부서</option>
                        ${allDepts.map(d => `<option value="${d}" ${deptFilter===d?"selected":""}>${d}</option>`).join("")}
                      </select>
                    </div>

                    <div style="color:var(--muted); font-weight:700; font-size:12px;">담당자
                     </div>
                      <div style="text-align:right;">
                       <div class="hbtn" id="qtyBtn" style="justify-content:flex-end; width:100%;">
                        수량 <span class="arrow">${sortKey==="qty"?arrow():"↕"}</span>
                       </div>
                      </div>
                     </div>
                  ${
                    view.length
                      ? view.map(r => {
                          const key = r.__key;
                          const sel = selectedKeys.has(key) ? "selected" : "";
                          return `
                            <div class="logRow ${sel}" data-row="${key}">
                              <div class="logDate">${formatKRDate(r.d)}</div>
                              <div class="logType ${statusClass(r.t)}">${r.t}</div>
                              <div class="logDept">${r.dept || "-"}</div>
                              <div class="logPerson">${r.person || ""}</div>
                              <div class="logQty ${statusClass(r.t)}">${(signedQty(r)>=0?"+":"")}${signedQty(r).toLocaleString()}</div>
                            </div>
                          `;
                        }).join("")
                      : `<div class="logRow">
                           <div class="logDate">-</div>
                           <div class="logType out">-</div>
                           <div class="logTo">내역 없음</div>
                           <div class="logQty out">-</div>
                         </div>`
                  }
                </div>
              </div>

              <!-- ✅ 내역 추가는 버튼으로만 -->
              <div class="detailActions">
                <button class="btn primary" id="openAdd">내역 추가</button>
                <button class="btn" id="refreshBtn">새로고침</button>
              </div>

            </div>
          </div>

          <!-- ✅ 내역추가 모달(바텀시트) -->
          <div class="modal" id="addModal" aria-hidden="true">
            <div class="modalOverlay" id="addOverlay"></div>
            <div class="sheet" role="dialog" aria-modal="true" aria-label="내역 추가">
              <div class="sheetHead">
                <div>내역 추가</div>
                <button class="sheetClose" id="addClose">닫기</button>
              </div>

              <div class="sheetBody">
                <div class="field">
                  <label for="aDate">날짜</label>
                  <input type="date" id="aDate">
                </div>

                <div class="field">
                  <label>구분</label>
                  <input type="hidden" id="aType" value="출고">
                  <div class="seg" id="aTypeSeg">
                    <button type="button" class="active out" data-v="출고">출고</button>
                    <button type="button" class="in" data-v="입고">입고</button>
                  </div>
                </div>

                <div class="field">
                  <label for="aDept">부서</label>
                  <select id="aDept">
                    ${allDepts.map(d => `<option value="${d}">${d}</option>`).join("")}
                  </select>
                </div>

                <div class="field">
                  <label for="aQty">수량</label>
                  <input id="aQty" inputmode="numeric" placeholder="예) 200" />
                </div>

                <div class="field">
                  <label for="aPerson">담당자</label>
                  <input id="aPerson" placeholder="000선임" />
                </div>
              </div>

              <div class="sheetFoot">
                <button class="btn primary" id="addBtn">추가</button>
              </div>
            </div>
          </div>
        `;

        const baseEdit = app.querySelector("#baseEdit");
        baseEdit.addEventListener("change", ()=>{
          const v = Number(String(baseEdit.value).replace(/,/g,""));
          it.baseStock = Number.isFinite(v) ? v : 0;
          saveAll();
          render();
        });

        const dateBtn = app.querySelector("#dateBtn");
        const datePop = app.querySelector("#datePop");
        const datePick = app.querySelector("#datePick");
        const dateOk = app.querySelector("#dateOk");
        const dateClear = app.querySelector("#dateClear");

        function closeDatePop(){ datePop.style.display = "none"; }
        dateBtn.addEventListener("click", ()=>{
          datePop.style.display = (datePop.style.display === "block") ? "none" : "block";
        });
        dateOk.addEventListener("click", ()=>{
          dateFilter = datePick.value || "";
          closeDatePop();
          render();
        });
        dateClear.addEventListener("click", ()=>{
          dateFilter = "";
          closeDatePop();
          render();
        });

        document.addEventListener("click", (e)=>{
          const wrap = app.querySelector(".hdateWrap");
          if(!wrap) return;
          if(!wrap.contains(e.target)) closeDatePop();
        }, { once:true });

        dateBtn.addEventListener("dblclick", ()=> toggleSort("date"));
        app.querySelector("#qtyBtn").addEventListener("click", ()=> toggleSort("qty"));

        app.querySelector("#typeSel").addEventListener("change", (e)=>{
          typeFilter = e.target.value;
          render();
        });
        app.querySelector("#deptSel").addEventListener("change", (e)=>{
          deptFilter = e.target.value;
          render();
        });

        app.querySelectorAll("[data-row]").forEach(row=>{
          row.addEventListener("click", ()=>{
            const key = row.dataset.row;
            if(selectedKeys.has(key)) selectedKeys.delete(key);
            else selectedKeys.add(key);
            render();
          });
        });

        app.querySelector("#bulkDelete").addEventListener("click", ()=>{
          if(selectedKeys.size === 0){
            alert("삭제할 내역을 선택해줘!");
            return;
          }
          it.logs = (it.logs||[]).filter(r => !selectedKeys.has(r.__key));
          selectedKeys.clear();
          saveAll();
          render();
        });

        // ✅ 내역추가 모달 열고닫기
        const addModal = app.querySelector("#addModal");
        const openAdd = app.querySelector("#openAdd");
        const addOverlay = app.querySelector("#addOverlay");
        const addClose = app.querySelector("#addClose");

        function openAddModal(){
          addModal.classList.add("show");
          document.body.style.overflow = "hidden";

          // 기본값 세팅(날짜는 오늘)
          const aDate = app.querySelector("#aDate");
          if(!aDate.value){
            const now = new Date();
            const y = now.getFullYear();
            const m = String(now.getMonth()+1).padStart(2,"0");
            const d = String(now.getDate()).padStart(2,"0");
            aDate.value = `${y}-${m}-${d}`;
          }
        }
        function closeAddModal(){
          addModal.classList.remove("show");
          document.body.style.overflow = "";
        }

        openAdd.addEventListener("click", openAddModal);
        addOverlay.addEventListener("click", closeAddModal);
        addClose.addEventListener("click", closeAddModal);

        // ✅ 구분(출고/입고) 세그 버튼
        const seg = app.querySelector("#aTypeSeg");
        const aType = app.querySelector("#aType");
        function setType(v){
          aType.value = v;
          seg.querySelectorAll("button").forEach(b=>{
            const on = b.dataset.v === v;
            b.classList.toggle("active", on);
            // 색 클래스 유지
            b.classList.toggle("out", b.dataset.v === "출고");
            b.classList.toggle("in", b.dataset.v === "입고");
          });
        }
        seg.querySelectorAll("button").forEach(b=>{
          b.addEventListener("click", ()=> setType(b.dataset.v));
        });
        
        // ✅ 추가(모달에서)
        app.querySelector("#addBtn").addEventListener("click", ()=>{
          const d = app.querySelector("#aDate").value;
          const t = app.querySelector("#aType").value;
          const dept = app.querySelector("#aDept").value;
          const person = (app.querySelector("#aPerson").value || "").trim();
          const qtyRaw = (app.querySelector("#aQty").value || "").trim();
          const qty = Number(qtyRaw);

          if(!d){ alert("날짜를 선택해줘!"); return; }
          if(!Number.isFinite(qty) || qty <= 0){ alert("수량은 0보다 큰 숫자! (예: 200)"); return; }

          it.logs = it.logs || [];
          it.logs.push(normalizeLog({
            d, t, dept,
            person: person || "(입력)",
            qty
          }));

          saveAll();

          // 입력 초기화
          app.querySelector("#aQty").value = "";
          app.querySelector("#aPerson").value = "";
          closeAddModal();
          render();
        });

        app.querySelector("#refreshBtn").addEventListener("click", ()=>{
          dateFilter = "";
          typeFilter = "전체";
          deptFilter = "전체";
          sortKey = "date";
          sortDir = "desc";
          selectedKeys.clear();
          render();
        });
      }

      render();
    }

    function router(){
      const hash = location.hash || "#/";
      const m = hash.match(/^#\/item\/(.+)$/);
      if(m){
        renderDetail(decodeURIComponent(m[1]));
      }else{
        renderHome();
      }
    }

    doSearch.addEventListener("click", ()=>{
      if((location.hash || "#/") !== "#/") location.hash = "#/";
      renderHome();
    });
    q.addEventListener("keydown", (e)=>{
      if(e.key === "Enter"){
        if((location.hash || "#/") !== "#/") location.hash = "#/";
        renderHome();
      }
    });
    q.addEventListener("input", ()=>{
      if((location.hash || "#/") === "#/") renderHome();
    });

    homeLink.addEventListener("click", (e)=>{
      e.preventDefault();
      q.value = "";
      location.hash = "#/";
      renderHome();
    });

    window.addEventListener("hashchange", router);

    if(!location.hash) location.hash = "#/";
    router();
  </script>
</body>
</html>
